<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcane-Publishing-Board</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>Content Calendar</h1>
      <button id="settings-btn" class="settings-btn" type="button" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path fill="currentColor" d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
      </button>
    </div>

    <!-- Settings Overlay -->
    <div id="settings-overlay" class="settings-overlay hidden">
      <div class="settings-panel" role="dialog" aria-label="Settings">
        <header class="settings-header">
          <h2>Settings</h2>
          <button type="button" id="settings-close" aria-label="Close">×</button>
        </header>
        <div class="settings-body">
          <label class="settings-row">
            <span>Tenant slug</span>
            <input id="setting-tenant" type="text" placeholder="mojodojo" autocomplete="off">
          </label>
          <p class="settings-hint">Used to build the SimpleOnboarding URL.</p>

          <div class="settings-section">Sorting</div>
          <label class="settings-row">
            <span>Sort by</span>
            <select id="setting-sort">
              <option value="dueDate">Due date</option>
              <option value="clientName">Client name</option>
              <option value="contentType">Content type</option>
              <option value="assignedTo">Writer</option>
            </select>
          </label>
          <label class="settings-row">
            <span>Order</span>
            <select id="setting-sort-reverse">
              <option value="false">Ascending ↑</option>
              <option value="true">Descending ↓</option>
            </select>
          </label>

          <div class="settings-section">Filters</div>
          <div class="settings-row">
            <span>Workflow status</span>
            <div class="exclude-clients-input-wrapper">
              <input id="setting-status-input" type="text" placeholder="Type to search statuses…" autocomplete="off">
              <div id="workflow-status-dropdown" class="exclude-clients-dropdown" hidden></div>
              <div id="workflow-status-tags" class="exclude-clients-tags"></div>
            </div>
          </div>
          <label class="settings-row">
            <span>Content type</span>
            <select id="setting-content-type">
              <option value="">— All types —</option>
              <option value="articles">Articles only</option>
              <option value="social">Social only</option>
            </select>
          </label>
          <div class="settings-row">
            <span>Exclude clients</span>
            <div class="exclude-clients-input-wrapper">
              <input id="setting-exclude-clients-input" type="text" placeholder="Type to search clients…" autocomplete="off">
              <div id="exclude-clients-dropdown" class="exclude-clients-dropdown" hidden></div>
              <div id="exclude-clients-tags" class="exclude-clients-tags"></div>
            </div>
          </div>

          <div class="settings-section">Date Range</div>
          <label class="settings-row">
            <span>Start date</span>
            <input id="setting-date-start" type="date" value="2025-12-01">
          </label>
          <label class="settings-row">
            <span>End date</span>
            <input id="setting-date-end" type="date" value="2027-01-31">
          </label>

          <div class="settings-section hidden-section">Available Statuses</div>
          <div id="statuses-list" class="statuses-list hidden-section">Loading…</div>
        </div>

        <div class="settings-actions">
          <button type="button" id="settings-cancel">Cancel</button>
          <button type="button" id="settings-save">Save</button>
        </div>
      </div>
    </div>

    <!-- Status Message -->
    <div id="status" class="status" hidden></div>

    <!-- Filter Section -->
    <div class="filter-section">
      <button id="refresh-btn" class="btn btn-secondary" type="button">Fetch Data</button>
      <span id="item-count" class="item-count"></span>
    </div>

    <!-- Results -->
    <div id="results" class="results" role="listbox" aria-label="Content pieces"></div>

    <!-- Copy Section -->
    <div class="copy-section hidden" id="copy-section">
      <button id="copy-all-btn" class="btn btn-secondary" type="button">Copy All</button>
      <button id="copy-selected-btn" class="btn btn-secondary" type="button">Copy Selected</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
